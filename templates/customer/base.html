<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ai Chat Bot{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
        }

        /* 🔥 HEADER */
        #topbar {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        /* 🔥 SIDEBAR */
        #sidebar {
            width: 220px;
            background: #1e3c72;
            color: #fff;
            position: fixed;
            top: 60px;
            left: 0;
            height: 100%;
            transition: 0.3s;
            padding: 15px;
        }

        #sidebar.hide {
            left: -220px;
        }

        #sidebar a {
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
        }

        #sidebar a:hover {
            background: #2a5298;
        }

        /* 🔥 CONTENT */
        #content {
            margin-top: 60px;
            margin-left: 220px;
            padding: 20px;
            transition: 0.3s;
        }

        #content.full {
            margin-left: 0;
        }
    </style>
</head>

<body>

<!-- 🔥 HEADER -->
<div id="topbar">

    <!-- Toggle Button -->
   

    <!-- Title -->
    <h5 class="mb-0 fw-bold">
        {% block header %}Ai Chat Bot{% endblock %}
    </h5>
 <button class="btn btn-sm btn-light me-3" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
    </button>
    <!-- Right Side -->
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-muted fw-semibold">
            👋 {{ request.user.email }}
        </span>

        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
             style="width:35px;height:35px;">
            {{ request.user.email|first|upper }}
        </div>
    </div>

</div>

<!-- 🔥 SIDEBAR -->
<div id="sidebar">

    <a href="{% url 'customer_dashboard' %}"><i class="fa fa-home me-2"></i> Dashboard</a>
    <a href="{% url 'customer_setting' %}"><i class="fa fa-gear me-2"></i> Settings</a>
    <a href="{% url 'save_qa' %}"><i class="fa fa-gear me-2"></i> Save QA</a>

    <hr>

    <a href="{% url 'customer_logout' %}"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
</div>

<!-- 🔥 CONTENT -->
<div id="content">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("content").classList.toggle("full");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
