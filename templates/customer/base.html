<!-- chat/templates/chat/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
        }
        /* Sidebar */
        #sidebar {
            min-width: 220px;
            max-width: 220px;
            background: #1e3c72;
            color: #fff;
            min-height: 100vh;
        }
        #sidebar a {
            color: #fff;
            text-decoration: none;
        }
        #sidebar a:hover {
            background: #2a5298;
            color: #fff;
        }
        /* Main content */
        #content {
            width: 100%;
            padding: 20px;
        }
        .card {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="d-flex flex-column p-3">
        <h4 class="text-center mb-4">Customer Panel</h4>
        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="{% url 'customer_dashboard' %}" class="nav-link">Dashboard</a></li>
            <li class="nav-item mb-2"><a href="#" class="nav-link">Profile</a></li>
            <li class="nav-item mb-2"><a href="#" class="nav-link">Settings</a></li>
            <li class="nav-item mt-auto"><a href="{% url 'customer_logout' %}" class="nav-link">Logout</a></li>
        </ul>
    </div>

    <!-- Main content -->
    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 rounded">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">{% block header %}Dashboard{% endblock %}</span>
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
