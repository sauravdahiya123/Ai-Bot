<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #111;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            color: #ff4081;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #333;
        }

        /* Main */
        .main {
            flex: 1;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #007bff, #ff4081);
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .content {
            padding: 20px;
        }

        /* Message */
        .msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="sidebar">
    <h2>Admin</h2>
    <a href="{% url 'add_url_page' %}">Add URL</a>
    <a  href="{% url 'user_list' %}">User List</a>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<div class="main">
<div class="header d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">

    <h4 class="m-0 text-white">🤖 Chatbot Admin Panel</h4>

    <a href="{% url 'logout' %}" style="background-color: white;" class="btn btn-white btn-sm">
         <i class="bi bi-box-arrow-right"></i>
   Logout
    </a>

</div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
