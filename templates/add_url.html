{% extends "base.html" %}

{% block content %}

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-4" style="width: 500px; border-radius: 12px;">
        
        <h3 class="text-center mb-4">🌐 Add URL</h3>

        {% if msg %}
            <div class="alert alert-info text-center">
                {{ msg }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- User Dropdown -->
            <div class="mb-3">
                <label class="form-label fw-bold">Select User</label>
                <select name="user_id" class="form-select" required>
                    <option value="">-- Choose User --</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">{{ user.email }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- URL Input -->
            <div class="mb-3">
                <label class="form-label fw-bold">Enter URLs</label>
                <input 
                    type="text" 
                    name="url" 
                    class="form-control" 
                    placeholder="https://a.com, https://b.com"
                    required
                >
                <small class="text-muted">Enter multiple URLs separated by commas</small>
            </div>

            <!-- Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    🚀 Add URL
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
