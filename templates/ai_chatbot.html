<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Voice Chatbot</title>
</head>
<body>
    <h1>AI Voice Chatbot</h1>
    <button id="startBtn">Start Voice Chat</button>
    <audio id="botAudio" controls></audio>

    <script>
        const startBtn = document.getElementById("startBtn");
        const botAudio = document.getElementById("botAudio");

        let mediaRecorder;
        let audioChunks = [];

        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                audioChunks = [];

                const formData = new FormData();
                formData.append("audio_file", audioBlob);

                const res = await fetch("/api/voice-ask/", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                botAudio.src = data.audio_url;  // URL of TTS audio
                botAudio.play();
            }

            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000);  // 5 seconds recording
        };
    </script>
</body>
</html>
