<script>
function addAudioMessage(type, audioUrl){

    let div = document.getElementById("messages");
    console.log("saurav",div);
    let msg = document.createElement("div");
    msg.className = type;

    // 🔥 wrapper (important for styling)
    let bubble = document.createElement("div");
    bubble.style.padding = "8px";
    bubble.style.borderRadius = "10px";
    bubble.style.margin = "5px";

    if(type === "user"){
        bubble.style.background = "#007bff";
        bubble.style.textAlign = "right";
    }else{
        bubble.style.background = "#333";
    }

    let audio = document.createElement("audio");
    audio.controls = true;
    audio.src = audioUrl;

    // 🔥 important styling
    audio.style.width = "220px";
    audio.style.display = "block";

    bubble.appendChild(audio);
    msg.appendChild(bubble);

    div.appendChild(msg);
    div.scrollTop = div.scrollHeight;
}
// =======================
// 🔥 VARIABLES
// =======================
let mediaRecorder;
let audioChunks = [];
let stream;

const recordBtn = document.getElementById("recordBtn");

recordBtn.addEventListener("click", toggleRecording);

let isRecording = false;

// =======================
async function toggleRecording(){

    if(!isRecording){
        await startRecording();
    } else {
        stopRecording();
    }
}


// =======================
// 🎤 START RECORDING
// =======================
async function startRecording(){

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
        if(e.data.size > 0){
            audioChunks.push(e.data);
        }
    };

    mediaRecorder.onstop = async () => {

        const audioBlob = new Blob(audioChunks, {
            type: "audio/webm; codecs=opus"
        });

        let url = URL.createObjectURL(audioBlob);

        // 👤 show user audio
        addAudioMessage("user", url);

        // send to backend
        await sendAudioToServer(audioBlob);
    };

    mediaRecorder.start();

    isRecording = true;

    recordBtn.classList.add("recording");

    // addMessage("bot", "🎤 Recording... बोलना शुरू करें");
}

// =======================
// ⏹ STOP
// =======================
function stopRecording(){

    if(mediaRecorder && mediaRecorder.state !== "inactive"){
        mediaRecorder.stop();
    }

    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    isRecording = false;

    recordBtn.classList.remove("recording");

    // addMessage("bot", "⏹ Recording stopped");
}

// =======================
// 🎤 BUTTON CLICK
// =======================
function startVoice(){
    startRecording();
}
// =======================
// ⏹️ STOP RECORDING
// =======================

        // console.log("Size:", audioBlob.size);
        // console.log("url:", userAudioURL);
        
        // addAudioMessage("user", userAudioURL);

        let formData = new FormData();
        formData.append("audio", audioBlob, "voice.webm");

        let res = await fetch(`${BASE_URL}/api/voice-chat/`, {
            method: "POST",
             headers: {
                "X-API-KEY": API_KEY1
            },
            body: formData
        });

        let data = await res.json();

        console.log("Response:", data);

        // 🤖 BOT TEXT SHOW
        // if(data.reply){
        //     addMessage("bot", data.reply);
        // }

        // 🔊 BOT AUDIO SHOW
        if(data.audio_url){

}

<script>

let shownMessages = new Set();
let userMobile = sessionStorage.getItem("userMobile") || "";
console.log("userMobile",userMobile);
let processedMessages = new Set(
    JSON.parse(sessionStorage.getItem("processedMessages") || "[]")
);
async function loadMessages() {

    if(!userMobile) return;

    let res = await fetch(`${BASE_URL}/api/get-messages?phone=${userMobile}`);
    let data = await res.json();

    let box = document.getElementById("messages");

    for (let msg of data) {

        let key = msg.phone + "_" + msg.message;

        if (processedMessages.has(key)) continue;

        processedMessages.add(key);
        sessionStorage.setItem(
            "processedMessages",
            JSON.stringify([...processedMessages])
        );

        addMessage("user", msg.message);

        let aiReply = await getAIResponse(msg.message);

        if(aiReply){
            addMessage("bot", aiReply);
            await connectSalesAPI(userMobile, aiReply);
        }
    }

    box.scrollTop = box.scrollHeight;
}
// auto refresh
setInterval(loadMessages, 2000);

function showSalesOptions(message, options = ["Yes", "No"]) {

    let div = document.getElementById("messages");

    let box = document.createElement("div");
    box.className = "sales-box";

    let text = document.createElement("div");
    text.innerText = message;
    box.appendChild(text);

    // ✅ safe fallback
    options = Array.isArray(options) ? options : ["Yes", "No"];

    options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;

        btn.className = (opt === "Yes") ? "yes-btn" : "no-btn";

        btn.onclick = () => handleSalesResponse(opt, box);

        box.appendChild(btn);
    });

    div.appendChild(box);
    div.scrollTop = div.scrollHeight;
}
</script>

<script>


// 🔥 AUTO API KEY (Django se inject hoga)
let API_KEY = "{{ api_key }}"; // 👈 important
let STORE_DATA = {{ store_data|yesno:"true,false" }};

console.log("STORE_DATA",STORE_DATA);
let visitor_id = localStorage.getItem("visitor_id");

if (!visitor_id) {
    visitor_id = crypto.randomUUID();
    localStorage.setItem("visitor_id", visitor_id);
}

console.log("Visitor ID:", visitor_id);

// 🔥 OPEN / CLOSE CHAT
function toggleChat(){

    let chat = document.getElementById("chatbox");

    // 🔥 condition

    } else {
        document.getElementById("userForm").style.display = "none";
    document.getElementById("chatbox").classList.toggle("active");
    }


}


document.addEventListener("DOMContentLoaded", function () {

    const welcomeMessage = "{{ bot.welcome_message|escapejs }}";
    const botImage = "{% if bot.bot_image %}{{ bot.bot_image.url }}{% endif %}";
    const botName = "{{ bot.name }}";

    // 🔥 add message
    addMessage("bot",welcomeMessage);

});

// 🔥 ADD MESSAGE UI
function addMessage(type, text){
    let div = document.getElementById("messages");
    let msg = document.createElement("div");
    msg.className = type;
    msg.innerText = text;
    div.appendChild(msg);
    div.scrollTop = div.scrollHeight;
}

let SALES_AFTER = {{ sales_prompt_after|default:10 }};
console.log("SALES_AFTER",SALES_AFTER);
// 🔥 ASK API (FastAPI)
var count  = 0;
let waitingForMobile = false;

async function ask(){
    count++;
    let input = document.getElementById("question");
    let q = input.value.trim();

    if(q === "") return;

    addMessage("user", q);
    input.value = "";

    if(waitingForMobile){

        let mobile = q.replace(/\D/g, '');

        if(mobile.length < 10){
            addMessage("bot", "❌ Please enter valid mobile number");
            return;
        }
        sessionStorage.setItem("userMobile", mobile);

        addMessage("bot", "⏳ Connecting you with sales...");

        waitingForMobile = false;

        // 🔥 API HIT
        await connectSalesAPI(mobile);

        addMessage("bot", "✅ Our sales team will contact you soon!");
        return;
    }

    let res = await fetch(`https://backbotv1.borgdesk.com/ask?q=${q}&vistor_id=${visitor_id}&api_key=${API_KEY}`);
   // let res = await fetch(`http://127.0.0.1:8002/ask?q=${q}&vistor_id=${visitor_id}&api_key=${API_KEY}`);
    let data = await res.json();

    addMessage("bot", data.answer);
    if(count == SALES_AFTER){
        showSalesOptions("Would you like to connect with our sales team?");    }
}

// ✅ ENTER PRESS SUPPORT
document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        ask();
    }
});


async function getAIResponse(message){

    try{
        let res = await fetch(`https://backbotv1.borgdesk.com/ask?q=${encodeURIComponent(message)}&vistor_id=${visitor_id}&api_key=${API_KEY}`);
        let data = await res.json();

        return data.answer || "";

    }catch(e){
        console.log("AI Error", e);
        return "";
    }
}

</script>
